name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Test Flyway Commands"]
    branches: [main, master]
    types:
      - completed

jobs:
  build-assets:
    if: ${{ github.event.workflow_run.conclusion == 'success' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build distribution
        run: ./mill commandline.dist

      - name: Find distribution zip
        id: find-zip
        run: |
          ZIP_PATH=$(find out -name "bundle.zip" | head -1)
          ZIP_NAME=$(basename "$ZIP_PATH")
          echo "zip-path=$ZIP_PATH" >> $GITHUB_OUTPUT
          echo "zip-name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: flyway-pg
          path: ${{ steps.find-zip.outputs.zip-path }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-assets
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: flyway-pg

      - name: Get zip filename
        id: get-zip
        run: |
          ZIP_FILE=$(find . -name "bundle.zip" | head -1)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          NEW_ZIP_NAME="flyway-pg-${TAG_NAME}.zip"
          mv "$ZIP_FILE" "$NEW_ZIP_NAME"
          echo "zip-file=$NEW_ZIP_NAME" >> $GITHUB_OUTPUT
          echo "zip-name=$NEW_ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.get-zip.outputs.zip-file }}
          generate_release_notes: true
