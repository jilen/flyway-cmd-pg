name: Test Flyway Commands

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-flyway:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: flyway
          POSTGRES_PASSWORD: flyway
          POSTGRES_DB: flyway_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Mill
        uses: mill-tool/setup-mill@v1
        with:
          mill-version: 1.1.3

      - name: Create test migration files
        run: |
          mkdir -p test-migrations
          cat > test-migrations/V1__Create_users_table.sql << 'EOF'
          CREATE TABLE users (
              id SERIAL PRIMARY KEY,
              name VARCHAR(100) NOT NULL,
              email VARCHAR(255) UNIQUE NOT NULL,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          EOF

          cat > test-migrations/V2__Add_age_column.sql << 'EOF'
          ALTER TABLE users ADD COLUMN age INTEGER;
          EOF

          cat > test-migrations/R__Create_view.sql << 'EOF'
          CREATE OR REPLACE VIEW user_summary AS
          SELECT id, name, email, created_at FROM users;
          EOF

      - name: Test Flyway Baseline
        run: |
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            -baselineVersion=0 \
            -baselineDescription="Initial baseline" \
            baseline

      - name: Test Flyway Info
        run: |
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            info

      - name: Test Flyway Migrate
        run: |
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            migrate

      - name: Test Flyway Info after Migrate
        run: |
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            info

      - name: Test Flyway Clean
        run: |
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            -cleanDisabled=false \
            clean

      - name: Test Flyway full cycle (clean -> baseline -> migrate -> info -> repair)
        run: |
          # Clean
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            -cleanDisabled=false \
            clean

          # Baseline
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            -baselineVersion=1.0.0 \
            -baselineDescription="Baseline after clean" \
            baseline

          # Migrate
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            migrate

          # Info
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            info

          # Repair
          mill run -- \
            -url=jdbc:postgresql://postgres:5432/flyway_test \
            -user=flyway \
            -password=flyway \
            -locations=filesystem:./test-migrations \
            repair
