name: Test Flyway Commands

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-flyway:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: flyway
          POSTGRES_PASSWORD: flyway
          POSTGRES_DB: flyway_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache mill packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier/
            ~/.cache/mill/download/
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Build distribution
        run: ./mill dist

      - name: Extract distribution
        run: |
          unzip out/dist.dest/bundle.zip -d /tmp/flyway-dist
          chmod +x /tmp/flyway-dist/bin/flyway
          echo "FLYWAY_DIST=/tmp/flyway-dist/bin/flyway" >> $GITHUB_ENV

      - name: Test Flyway Baseline
        run: |
          chmod +x scripts/run-flyway-cmd
          scripts/run-flyway-cmd -baselineVersion=0 -baselineDescription="Initial baseline" baseline

      - name: Test Flyway Info
        run: scripts/run-flyway-cmd info

      - name: Test Flyway Migrate
        run: scripts/run-flyway-cmd migrate

      - name: Test Flyway Info after Migrate
        run: scripts/run-flyway-cmd info

      - name: Test Flyway Clean
        run: scripts/run-flyway-cmd -cleanDisabled=false clean

      - name: Test Flyway full cycle (clean -> baseline -> migrate -> info -> repair)
        run: |
          # Baseline with version 0 to ensure V1 gets applied
          scripts/run-flyway-cmd -baselineVersion=0 -baselineDescription="Baseline after clean" baseline
          # Migrate
          scripts/run-flyway-cmd migrate
          # Info
          scripts/run-flyway-cmd info
          # Repair
          scripts/run-flyway-cmd repair
